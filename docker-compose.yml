# ============================================================
# NexusCockpit v2.0 Infrastructure Stack
# Cockpit Control + Operations Dashboard: Go Gateway + Python AI + TS Frontend
# 简化: RabbitMQ/Celery 已移除（任务队列改为 asyncio.create_task）
# Start all middleware: docker compose up -d
# Start full stack: docker compose --profile app up -d
# ============================================================

services:
  # ============================================================
  # v2.1 Application Services (profiles: app)
  # ============================================================

  # --- Go Gateway (NexusGate) ---
  nexus_gate:
    profiles: ["app"]
    build:
      context: ./backend_design/nexus_gate
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - NEXUS_AI_HOST=nexus_ai
      - NEXUS_AI_PORT=8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # --- Python AI Backend ---
  nexus_ai:
    profiles: ["app"]
    build:
      context: ./backend_design
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - MILVUS_URI=http://milvus:19530
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # v2.2 简化: RABBITMQ 环境变量已移除（Celery/RabbitMQ 未落地）
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./assets:/app/assets
      - ./docs:/app/docs
    depends_on:
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # --- Frontend (Next.js) ---
  nexus_frontend:
    profiles: ["app"]
    build:
      context: ./frontend_design
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - nexus_gate
    restart: unless-stopped

  # ============================================================
  # Infrastructure Services (always started)
  # ============================================================

  # --- Milvus Vector Store ---
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    environment:
      # 密码支持环境变量注入（生产环境在 .env 中覆盖，默认值仅供开发环境）
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9201:9091"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  # --- Neo4j Knowledge Graph ---
  neo4j:
    image: neo4j:5.19.0
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-nexuscockpit}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"

  # --- Redis Stack (Cache + Vector Search + Rate Limit + PubSub) ---
  # v2.0: redis-stack-server 支持 RediSearch + VECTOR 向量索引
  # v2.1: 多座舱 DB 分区隔离 (cockpit-01→DB1, cockpit-02→DB2, cockpit-03→DB3)
  redis:
    image: redis/redis-stack-server:7.2.0-v4
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --protected-mode no
    volumes:
      - redis_data:/data
    ports:
      # 宿主机 16379 → 容器 6379 (避开 Windows Hyper-V 6349-6448 端口保留范围)
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- MySQL (User Data + Audit Log + 座舱隔离) ---
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-nexuscockpit}
      MYSQL_DATABASE: nexus_cockpit
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      # v2.1: 启动时自动执行迁移脚本
      - ./backend_design/scripts/v2.1_migration.sql:/docker-entrypoint-initdb.d/v2.1_migration.sql
    ports:
      # 宿主机 13306 → 容器 3306 (避让本机已安装的 MySQL)
      - "13306:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-nexuscockpit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Loki (Log Aggregation) ---
  loki:
    image: grafana/loki:2.9.5
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yml
      - loki_data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yml

  # --- Prometheus (Metrics) ---
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9200:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- Grafana (Dashboard) ---
  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  # v2.2 简化: rabbitmq_data 已移除
  mysql_data:
  prometheus_data:
  grafana_data:
  loki_data:
