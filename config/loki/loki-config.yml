# ============================================================
# Loki 2.9.5 单机模式配置 (NexusCockpit 日志聚合)
# 挂载路径: /etc/loki/local-config.yml (见 docker-compose.yml)
# ============================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h

limits_config:
  # 日志保留 7 天，避免开发环境磁盘无限增长
  retention_period: 168h
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_series: 5000

compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  retention_enabled: true

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

analytics:
  # 关闭匿名使用统计上报
  reporting_enabled: false
